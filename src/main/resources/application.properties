spring.application.name=global-news-engine-v1
spring.jpa.hibernate.ddl-auto=update
spring.flyway.baseline-on-migrate=true
gdelt.manifest-url=http://data.gdeltproject.org/gdeltv2/masterfilelist.txt
gdelt.download-base-url=http://data.gdeltproject.org/gdeltv2
gdelt.ingestion.enabled=true
gdelt.ingestion.initial-delay=PT10S
gdelt.ingestion.poll-interval=PT5M
gdelt.ingestion.max-windows-per-poll=4
