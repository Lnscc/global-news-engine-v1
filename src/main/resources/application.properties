spring.application.name=global-news-engine-v1
spring.jpa.hibernate.ddl-auto=update
spring.flyway.baseline-on-migrate=true
gdelt.manifest-url=http://data.gdeltproject.org/gdeltv2/masterfilelist.txt
gdelt.download-base-url=http://data.gdeltproject.org/gdeltv2
gdelt.ingestion.enabled=true
gdelt.ingestion.initial-delay=PT10S
gdelt.ingestion.poll-interval=PT5M
gdelt.ingestion.max-windows-per-poll=4
gdelt.ingestion.max-failed-windows-per-poll=20
gdelt.staging.enabled=true
gdelt.staging.initial-delay=PT20S
gdelt.staging.poll-interval=PT1M
gdelt.staging.batch-size=1000
gdelt.staging.max-batches-per-run=10
articles.enabled=true
articles.initial-delay=PT30S
articles.poll-interval=PT1M
articles.batch-size=1000
articles.max-batches-per-run=10
